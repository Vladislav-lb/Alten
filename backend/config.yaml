name: Alten EMS Backend
version: "0.1.17"
slug: alten_ems_backend
description: FastAPI backend for BESS optimization, Modbus, MQTT, and Home Assistant EMS services.
url: https://github.com/Vladislav-lb/Alten
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
homeassistant_api: true
watchdog: http://[HOST]:[PORT:8000]/api/health
webui: http://[HOST]:[PORT:8000]/dashboard
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Alten EMS REST API
map:
  - type: addon_config
    read_only: false
options:
  cors_origins: "*"
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  modbus_host: ""
  modbus_port: 502
  modbus_unit: 1
  ha_url: http://supervisor/core/api
  oree_api_key: ""
  oree_prices_url: https://www.oree.com.ua/index.php/api/damprices
  oree_zone_eic: 10Y1001C--000182
  oree_date_param: date
schema:
  cors_origins: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  modbus_host: str
  modbus_port: int
  modbus_unit: int
  ha_url: str
  oree_api_key: password
  oree_prices_url: str
  oree_zone_eic: str
  oree_date_param: str
