name: Alten EMS Backend
version: "0.1.0"
slug: alten_ems_backend
description: FastAPI backend for BESS optimization, Modbus, MQTT, and Home Assistant EMS services.
url: https://github.com/Vladislav-lb/Alten
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
webui: http://[HOST]:[PORT:8000]/dashboard
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Alten EMS REST API
map:
  - type: addon_config
    read_only: false
options:
  cors_origins: "*"
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  modbus_host: ""
  modbus_port: 502
  modbus_unit: 1
schema:
  cors_origins: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  modbus_host: str
  modbus_port: int
  modbus_unit: int
